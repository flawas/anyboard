name: Update WP Umbrella Dashboard

on:
  schedule:
    - cron: '*/5 * * * *'   # alle 5 Minuten
  workflow_dispatch:          # manuell auslösbar

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch WP Umbrella API & generate JSON
        env:
          WP_UMBRELLA_API_KEY: ${{ secrets.WP_UMBRELLA_API_KEY }}
        run: php scripts/generate-data.php

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wp-umbrella-data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
